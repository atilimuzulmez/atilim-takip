<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Atilim Takip">
<title>Atilim Takip</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg:      #F2F1ED;
  --surface: #FFFFFF;
  --sf2:     #F5F3EE;
  --sf3:     #ECEAE4;
  --border:  #E8E5DF;
  --border2: #D5D1CA;
  --text:    #1A1714;
  --muted:   #6B6762;
  --dim:     #B0ABA3;
  --accent:  #C8A96E;
  --accent2: #A8893E;
  --done:    #4CAF7D;
  --danger:  #D04040;
  --banka:   #4CAF7D;
  --elden:   #5B9BD5;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text); }
button { font-family:inherit; cursor:pointer; border:none; background:none; }

/* ===== LAYOUT ===== */
.app { display:flex; flex-direction:column; height:100%; padding-top:var(--safe-top); position:relative; overflow:hidden; }

/* ===== DRAWER ===== */
.drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.drawer-overlay.open { opacity:1; pointer-events:all; }

.drawer {
  position:fixed; top:0; left:0; bottom:0; width:280px;
  background:var(--surface); z-index:201;
  transform:translateX(-100%); transition:transform 0.28s cubic-bezier(0.32,0.72,0,1);
  display:flex; flex-direction:column;
  padding-top:var(--safe-top);
}
.drawer.open { transform:none; }

.drawer-logo { padding:20px 20px 16px; border-bottom:1px solid var(--border); }
.drawer-logo h1 { font-family:'Playfair Display',serif; font-size:20px; }
.drawer-logo small { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; display:block; margin-top:2px; }

.drawer-body { flex:1; overflow-y:auto; padding:0 0 8px; }
.drawer-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); padding:14px 20px 5px; display:block; }
.drawer-section { padding:0 10px; }
.drawer-divider { border:none; border-top:1px solid var(--border); margin:8px 16px; }

.sb-btn {
  display:flex; align-items:center; gap:10px;
  width:100%; padding:9px 12px; margin-bottom:1px;
  background:none; border:1px solid transparent; border-radius:9px;
  color:var(--muted); font-size:13px; text-align:left;
}
.sb-btn:active { background:var(--sf2); }
.sb-btn.active { background:rgba(200,169,110,0.15); color:var(--accent2); font-weight:500; border-color:rgba(200,169,110,0.4); }
.sb-btn .ico { width:16px; text-align:center; font-size:13px; flex-shrink:0; }

.sb-collapse { display:flex; align-items:center; justify-content:space-between; padding:8px 12px 4px; border-radius:8px; }
.sb-collapse-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); }
.arrow { font-size:12px; color:var(--dim); transition:transform 0.2s; display:inline-block; }
.arrow.closed { transform:rotate(-90deg); }
.collapsible { overflow:hidden; max-height:1000px; opacity:1; transition:max-height 0.3s, opacity 0.2s; }
.collapsible.closed { max-height:0; opacity:0; }

.drawer-footer { border-top:1px solid var(--border); padding:10px; flex-shrink:0; padding-bottom:calc(10px + var(--safe-bot)); }
.settings-btn { display:flex; align-items:center; gap:9px; width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:9px; color:var(--muted); font-size:13px; }
.settings-btn:active { background:var(--sf2); }

/* ===== HEADER ===== */
.header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 16px 10px; flex-shrink:0; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.header-menu-btn { width:34px; height:34px; border-radius:9px; background:var(--sf2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:16px; }
.header-menu-btn:active { background:var(--sf3); }
.header-title { font-family:'Playfair Display',serif; font-size:19px; cursor:pointer; }
.header-actions { display:flex; gap:8px; }
.btn-icon { width:34px; height:34px; border-radius:9px; background:var(--sf2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:15px; }
.btn-icon:active { background:var(--sf3); }
.btn-add { background:var(--text); color:#fff; border-radius:9px; padding:7px 14px; font-size:13px; font-weight:500; }
.btn-add:active { background:#333; }

.month-nav { display:flex; align-items:center; justify-content:space-between; }
.month-label { font-family:'Playfair Display',serif; font-size:15px; color:var(--accent); }
.nav-btn { width:28px; height:28px; border-radius:7px; background:var(--sf2); border:1px solid var(--border); font-size:14px; display:flex; align-items:center; justify-content:center; color:var(--muted); }
.nav-btn:active { background:var(--sf3); }

/* ===== RANGE PICKER ===== */
.range-picker { padding:6px 12px 4px; }
.range-lbl { font-size:10px; letter-spacing:1px; color:var(--dim); text-transform:uppercase; display:block; margin-bottom:4px; }
.date-pick-btn { width:100%; background:var(--sf2); border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:12px; color:var(--muted); text-align:left; margin-bottom:6px; }
.date-pick-btn.set { color:var(--text); }

/* ===== CAL STRIP ===== */
.cal-strip { background:var(--surface); border-bottom:1px solid var(--border); padding:8px 12px; display:flex; gap:2px; overflow-x:auto; scrollbar-width:none; flex-shrink:0; }
.cal-strip::-webkit-scrollbar { display:none; }
.cal-day { flex:0 0 44px; padding:5px 2px; border-radius:8px; text-align:center; border:1px solid transparent; }
.cal-day:active { background:var(--sf2); }
.cal-day.active { background:var(--text); }
.cal-day.today .cdnum { color:var(--accent); }
.cal-day.active .cdnum, .cal-day.active .cdn { color:#fff; }
.cdn { font-size:8px; color:var(--dim); text-transform:uppercase; letter-spacing:0.3px; }
.cdnum { font-size:14px; font-weight:500; color:var(--muted); margin-top:1px; }
.cal-dot { width:4px; height:4px; border-radius:50%; background:var(--accent); margin:3px auto 0; opacity:0; }
.cal-dot.on { opacity:1; }
.cal-day.active .cal-dot { background:rgba(255,255,255,0.6); }

/* ===== STATS ===== */
.stats { padding:8px 16px; display:flex; gap:12px; align-items:center; flex-shrink:0; }
.stat { font-size:12px; color:var(--muted); }
.stat strong { color:var(--text); font-size:13px; }
.progress-bar { flex:1; height:3px; background:var(--sf3); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:var(--done); border-radius:2px; transition:width 0.3s; }

/* ===== VIEW TITLE ===== */
.view-title { padding:8px 16px 4px; font-family:'Playfair Display',serif; font-size:17px; flex-shrink:0; }

/* ===== LIST ===== */
.list-wrap { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:6px 12px 16px; }

.task-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; display:flex; gap:10px; align-items:flex-start; border-left:3px solid var(--border); }
.task-card.banka { border-left-color:var(--banka); }
.task-card.elden { border-left-color:var(--elden); }
.task-card.done-card { opacity:0.45; }

.chk { width:22px; height:22px; border-radius:50%; border:1.5px solid #CCC; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; color:transparent; margin-top:1px; }
.chk.checked { background:#E8F5EF; border-color:var(--done); color:var(--done); }

.task-info { flex:1; min-width:0; }
.task-top { display:flex; align-items:center; gap:5px; margin-bottom:4px; flex-wrap:wrap; }
.kurum-badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.badge { display:inline-block; padding:2px 7px; border-radius:20px; font-size:10px; font-weight:500; }
.badge-tur   { background:#F0EDE6; color:#7A6A42; }
.badge-banka { background:#E4F3EC; color:#2A6E48; }
.badge-elden { background:#E4EDF6; color:#2A4E78; }
.task-date { font-size:11px; color:var(--dim); margin-bottom:2px; }
.task-desc { font-size:11px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.task-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }
.task-tutar { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:var(--accent); white-space:nowrap; }
.task-card.done-card .task-tutar { text-decoration:line-through; }
.task-actions { display:flex; gap:4px; }
.act-btn { width:28px; height:28px; border-radius:7px; border:1px solid var(--border); background:none; color:var(--dim); font-size:13px; display:flex; align-items:center; justify-content:center; }
.act-btn:active { background:var(--sf2); }

/* ===== TOTAL ===== */
.total-bar { background:var(--surface); border-top:1px solid var(--border2); padding:10px 16px; padding-bottom:calc(10px + var(--safe-bot)); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
.total-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); }
.total-sub { font-size:11px; color:var(--dim); margin-top:1px; }
.total-amount { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; }

/* ===== EMPTY ===== */
.empty { text-align:center; padding:48px 20px; color:var(--dim); }
.empty p { font-size:15px; margin-bottom:6px; }

/* ===== SUMMARY ===== */
.summary-wrap { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:10px 12px 16px; }
.sum-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; }
.sum-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px; }
.sum-card-label { font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--dim); margin-bottom:4px; }
.sum-card-num { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; }
.sum-card-sub { font-size:10px; color:var(--muted); margin-top:2px; }
.sum-chart { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:10px; }
.sum-chart-title { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--dim); margin-bottom:12px; }
.sum-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.sum-bar-label { min-width:90px; font-size:11px; font-weight:500; display:flex; align-items:center; gap:5px; }
.sum-bar-track { flex:1; height:6px; background:var(--sf3); border-radius:3px; overflow:hidden; }
.sum-bar-fill { height:100%; border-radius:3px; transition:width 0.4s; }
.sum-bar-val { min-width:80px; text-align:right; font-size:11px; font-weight:600; }
.comp-cards { display:flex; gap:8px; flex-wrap:wrap; }
.comp-card { flex:1; min-width:80px; background:var(--sf2); border-radius:10px; padding:12px; }
.comp-card-label { font-size:9px; color:var(--dim); letter-spacing:1px; text-transform:uppercase; margin-bottom:5px; }
.comp-card-val { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; }
.comp-card-sub { font-size:10px; color:var(--muted); margin-top:2px; }

/* ===== SETTINGS ===== */
.settings-wrap { flex:1; overflow-y:auto; padding:12px; }
.set-section { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; }
.set-section-title { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--dim); margin-bottom:10px; }
.tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
.tag { display:inline-flex; align-items:center; gap:5px; background:var(--sf2); border:1px solid var(--border); border-radius:20px; padding:5px 10px; font-size:12px; }
.tag-del { color:var(--dim); font-size:13px; }
.btn-add-tag { background:none; border:1px dashed var(--border2); border-radius:6px; color:var(--accent); font-size:12px; padding:5px 12px; }

/* ===== OVERLAY & MODAL ===== */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(4px); z-index:300; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border-radius:20px 20px 0 0; padding:20px; padding-bottom:calc(20px + var(--safe-bot)); width:100%; max-height:92vh; overflow-y:auto; transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); }
.overlay.open .modal { transform:none; }
.modal-handle { width:36px; height:4px; background:var(--border2); border-radius:2px; margin:0 auto 16px; }
.modal h3 { font-family:'Playfair Display',serif; font-size:18px; margin-bottom:16px; }

.fg { margin-bottom:12px; }
.fg label { display:block; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); margin-bottom:5px; }
.fg input, .fg select, .fg textarea { width:100%; background:var(--sf2); border:1px solid var(--border); border-radius:10px; padding:11px 13px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; -webkit-appearance:none; }
.fg input:focus, .fg select:focus { border-color:var(--accent); }
.fg textarea { resize:none; min-height:70px; }
.form-row { display:flex; gap:10px; }
.form-row .fg { flex:1; }

.rep-opts { display:flex; gap:6px; flex-wrap:wrap; }
.rep-opt { padding:6px 12px; border-radius:20px; border:1px solid var(--border); font-size:12px; color:var(--muted); background:var(--sf2); }
.rep-opt.sel { border-color:var(--accent); color:var(--accent); background:rgba(200,169,110,0.1); }

.modal-actions { display:flex; gap:8px; margin-top:16px; }
.btn-cancel { flex:1; background:var(--sf2); border:1px solid var(--border); border-radius:10px; padding:12px; font-size:14px; color:var(--muted); }
.btn-save { flex:2; background:var(--text); color:#fff; border-radius:10px; padding:12px; font-size:14px; font-weight:500; }

.scope-btn { width:100%; background:var(--sf2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; text-align:left; margin-bottom:8px; }
.scope-btn strong { display:block; font-size:13px; margin-bottom:2px; }
.scope-btn small { font-size:11px; color:var(--dim); }
.scope-btn.danger { color:var(--danger); }

/* ===== TOAST ===== */
.toast { position:fixed; bottom:calc(80px + var(--safe-bot)); left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:#fff; border-radius:20px; padding:10px 18px; font-size:13px; z-index:999; opacity:0; transition:all 0.25s; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ===== SYNC ===== */
.sync-badge { position:fixed; top:calc(8px + var(--safe-top)); left:50%; transform:translateX(-50%); background:var(--done); color:#fff; font-size:11px; padding:4px 12px; border-radius:20px; z-index:500; opacity:0; transition:opacity 0.3s; pointer-events:none; }

/* ===== LOADING ===== */
.loading { display:flex; align-items:center; justify-content:center; flex:1; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="loading" id="loading"><div class="spinner"></div></div>
</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-logo">
    <h1>Atilim Takip</h1>
    <small>Odeme Takibi</small>
  </div>
  <div class="drawer-body">
    <div class="drawer-section">
      <span class="drawer-label">Gorunum</span>
      <button class="sb-btn active" id="sb-today"   onclick="setView('today');closeDrawer()">  <span class="ico">📅</span> Bugun</button>
      <button class="sb-btn"        id="sb-upcoming" onclick="setView('upcoming');closeDrawer()"><span class="ico">🗓</span> Bu Hafta</button>
      <button class="sb-btn"        id="sb-all"      onclick="setView('all');closeDrawer()">    <span class="ico">📋</span> Tumu</button>
      <button class="sb-btn"        id="sb-done"     onclick="setView('done');closeDrawer()">   <span class="ico">✅</span> Tamamlananlar</button>
      <button class="sb-btn"        id="sb-summary"  onclick="setView('summary');closeDrawer()"><span class="ico">📊</span> Aylik Ozet</button>
      <button class="sb-btn"        id="sb-range"    onclick="setView('range');closeDrawer()">  <span class="ico">📆</span> Tarih Araligi</button>

      <div id="range-picker" class="range-picker" style="display:none">
        <input type="hidden" id="range-start">
        <input type="hidden" id="range-end">
        <label class="range-lbl">Baslangic</label>
        <input type="date" id="range-start-input" style="width:100%;background:var(--sf2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text);margin-bottom:8px;-webkit-appearance:none" onchange="setRangeDate('start',this.value)">
        <label class="range-lbl">Bitis</label>
        <input type="date" id="range-end-input" style="width:100%;background:var(--sf2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text);-webkit-appearance:none" onchange="setRangeDate('end',this.value)">
      </div>
    </div>

    <hr class="drawer-divider">

    <div class="drawer-section">
      <div class="sb-collapse" onclick="toggleSection('sec-tur')">
        <span class="sb-collapse-label">Tur</span>
        <span class="arrow" id="sec-tur-arrow">▾</span>
      </div>
      <div class="collapsible" id="sec-tur"><div id="sb-tur-list"></div></div>
    </div>

    <hr class="drawer-divider">

    <div class="drawer-section">
      <div class="sb-collapse" onclick="toggleSection('sec-kurum')">
        <span class="sb-collapse-label">Kurum</span>
        <span class="arrow" id="sec-kurum-arrow">▾</span>
      </div>
      <div class="collapsible" id="sec-kurum"><div id="sb-kurum-list"></div></div>
    </div>

    <hr class="drawer-divider">

    <div class="drawer-section">
      <div class="sb-collapse" onclick="toggleSection('sec-kanal')">
        <span class="sb-collapse-label">Odeme Sekli</span>
        <span class="arrow" id="sec-kanal-arrow">▾</span>
      </div>
      <div class="collapsible" id="sec-kanal"><div id="sb-kanal-list"></div></div>
    </div>
  </div>
  <div class="drawer-footer">
    <button class="settings-btn" onclick="setView('settings');closeDrawer()"><span>⚙️</span> Ayarlar</button>
  </div>
</div>

<!-- GÖREV MODAL -->
<div class="overlay" id="task-overlay" onclick="overlayBg(event,'task-overlay',closeModal)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modal-title">Yeni Gorev</h3>
    <div class="form-row">
      <div class="fg"><label>Kurum *</label><select id="f-kurum" onchange="handleNewItem(this,'kurum')"></select></div>
      <div class="fg"><label>Tarih *</label><input type="date" id="f-date"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Odeme Turu *</label><select id="f-tur" onchange="handleNewItem(this,'tur')"></select></div>
      <div class="fg"><label>Odeme Sekli *</label><select id="f-kanal" onchange="handleNewItem(this,'kanal')"></select></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Tutar (TL)</label><input type="text" id="f-tutar" placeholder="0" inputmode="numeric" oninput="fmtTutar(this)"></div>
      <div class="fg"><label>Saat</label><input type="time" id="f-time"></div>
    </div>
    <div class="fg"><label>Notlar</label><textarea id="f-desc" placeholder="Notlar..."></textarea></div>
    <div class="fg">
      <label>Tekrar</label>
      <div class="rep-opts">
        <span class="rep-opt sel" data-val="none"    onclick="selRep('none',this)">Yok</span>
        <span class="rep-opt"    data-val="daily"    onclick="selRep('daily',this)">Gunluk</span>
        <span class="rep-opt"    data-val="weekly"   onclick="selRep('weekly',this)">Haftalik</span>
        <span class="rep-opt"    data-val="monthly"  onclick="selRep('monthly',this)">Aylik</span>
        <span class="rep-opt"    data-val="workdays" onclick="selRep('workdays',this)">Hafta ici</span>
      </div>
    </div>
    <div class="fg" id="rep-end-fg" style="display:none">
      <label>Tekrar Bitis</label>
      <input type="date" id="f-rep-end">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Iptal</button>
      <button class="btn-save"   onclick="saveTask()">Kaydet</button>
    </div>

const DEFAULT_KURUM = ['ACTION','ALTUNIZADE','ATASEHIR','BILECIK','DENIZLI','DRAGOS','EMINEVIM','ESENLER','HYUNDAI','KAVACIK','KAYNARCA','MALTEPE','PENDIK','RANGE','SAPANCA','SISLI'];

function kurumColor(kurum) {
  var idx = DEFAULT_KURUM.indexOf(kurum);

  for (var i = 0; i < kurum.length; i++) h = kurum.charCodeAt(i) + ((h<<5)-h);

}

// ===== TEKRAR =====
function getInstances(task, from, to) {
  if (!task.repeat || task.repeat === 'none') return [];
  var result = [];
  var start  = fromDS(task.date);
  var end    = task.repeatEnd
    ? new Date(Math.min(fromDS(to).getTime(), fromDS(task.repeatEnd).getTime()))
    : fromDS(to);

  function push(d) {
    var ds = toDS(d);
    if (ds <= task.date) return;
    if (ds < from || ds > toDS(end)) return;
    if ((task.exceptions||[]).includes(ds)) return;
    var ov = (task.overrides||{})[ds]||{};
    result.push(Object.assign({}, task, ov, {id:task.id+'_'+ds, date:ds, isRepeat:true, origId:task.id}));
  }

  if (task.repeat === 'daily') {
    for (var d = new Date(start); d <= end; d.setDate(d.getDate()+1)) push(new Date(d));
  } else if (task.repeat === 'weekly') {
    for (var d = new Date(start); d <= end; d.setDate(d.getDate()+7)) push(new Date(d));
  } else if (task.repeat === 'monthly') {
    var dom = start.getDate(), m = start.getMonth()+1, y = start.getFullYear();
    for (;;) {
      if (m > 11) { m=0; y++; }
      var dmax = new Date(y,m+1,0).getDate();
      var d = new Date(y, m, Math.min(dom,dmax));
      if (d > end) break;
      push(d); m++;
    }
  } else if (task.repeat === 'workdays') {
    for (var d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
      if (d.getDay()>=1 && d.getDay()<=5) push(new Date(d));
    }
  }
  return result;
}

function tasksForDate(ds) {
  var direct  = tasks.filter(function(t){return t.date===ds;});
  var repeats = tasks.filter(function(t){return t.repeat&&t.repeat!=='none';})
    .reduce(function(acc,t){return acc.concat(getInstances(t,ds,ds));},[]);
  return direct.concat(repeats);
}

function tasksInRange(from, to) {
  var direct  = tasks.filter(function(t){return t.date>=from&&t.date<=to;});
  var seen    = new Set(direct.map(function(t){return t.id;}));
  var repeats = tasks.filter(function(t){return t.repeat&&t.repeat!=='none';})
    .reduce(function(acc,t){return acc.concat(getInstances(t,from,to));},[])
    .filter(function(t){return !seen.has(t.id);});
  return direct.concat(repeats);
}

function isDone(task, dateStr) {
  if (task.isRepeat) {
    var orig = tasks.find(function(t){return t.id===task.origId;});
    return orig ? (orig.doneOnDates||[]).includes(dateStr) : false;
  }
  return task.done||false;
}

}

function getFiltered() {
  var sel = toDS(curDate);
  var list = [];
  if (curView === 'today') {
    list = tasksForDate(sel);
  } else if (curView === 'upcoming') {
    var diff = (new Date().getDay()+6)%7;
    var mon  = new Date(); mon.setDate(mon.getDate()-diff);
    var sun  = new Date(mon); sun.setDate(mon.getDate()+6);
    list = tasksInRange(toDS(mon),toDS(sun));
  } else if (curView === 'all') {
    var y = curDate.getFullYear(), m = curDate.getMonth();
    var mStr = String(m+1).padStart(2,'0');
    var days = new Date(y,m+1,0).getDate();
    list = tasksInRange(y+'-'+mStr+'-01', y+'-'+mStr+'-'+String(days).padStart(2,'0'));
  } else if (curView === 'done') {
    list = tasks.filter(function(t){return t.done||(t.doneOnDates&&t.doneOnDates.length>0);});
  } else if (curView === 'range') {
    if (rangeStart && rangeEnd) list = tasksInRange(rangeStart, rangeEnd);
    else if (rangeStart) list = tasks.filter(function(t){return t.date>=rangeStart;});
    else list = tasks.slice();
  }
  if (turFilters.length)   list = list.filter(function(t){return turFilters.includes(t.tur);});
  if (kurumFilters.length) list = list.filter(function(t){return kurumFilters.includes(t.kurum);});
  if (kanalFilters.length) list = list.filter(function(t){return kanalFilters.includes(t.kanal);});
  return list;
}

function renderList() {
  var wrap = document.getElementById('list-wrap');
  if (!wrap) return;
  var sel  = toDS(curDate);
  var list = getFiltered();

  var undone = list.filter(function(t){return !isDone(t,t.date||sel);});

  var subEl   = document.getElementById('total-sub');

  if (!list.length) {
    wrap.innerHTML = '<div class="empty"><p>Gorev bulunamadi</p></div>';
    return;
  }

  list.sort(function(a,b){
    var ad=isDone(a,sel), bd=isDone(b,sel);
    if (ad!==bd) return ad?1:-1;
    if (a.date!==b.date) return a.date.localeCompare(b.date);
    return (a.time||'').localeCompare(b.time||'');
  });

  var showDate = curView!=='today';
  var html = '';
  list.forEach(function(t) {
    var done   = isDone(t, t.date||sel);

          '<span class="badge badge-tur">'+(t.tur||'—')+'</span>'+
          '<span class="badge '+(t.kanal==='BANKA'?'badge-banka':'badge-elden')+'">'+(t.kanal||'—')+'</span>'+
        '</div>'+
        ((t.desc||'').trim()?'<div class="task-desc">'+t.desc.trim()+'</div>':'')+
      '</div>'+
      '<div class="task-right">'+
        '<div class="task-tutar">'+(t.tutar>0?t.tutar.toLocaleString('tr-TR')+' TL':'—')+'</div>'+
        '<div class="task-actions">'+
          '<button class="act-btn" onclick="event.stopPropagation();startEdit(\''+tid+'\')">✏️</button>'+
          '<button class="act-btn" onclick="event.stopPropagation();startDelete(\''+tid+'\',\''+tOrig+'\')">🗑</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  });
  wrap.innerHTML = html;
}

// ===== GÖREV AKSİYONLARI =====
function toggleDone(id, origId, dateStr) {
  var realId = origId||id;
  var task   = tasks.find(function(t){return t.id===realId;});
  if (!task) return;
  if (origId) {
    if (!task.doneOnDates) task.doneOnDates=[];
    var idx = task.doneOnDates.indexOf(dateStr);
    if (idx>=0) task.doneOnDates.splice(idx,1); else task.doneOnDates.push(dateStr);
  } else {
    task.done = !task.done;
  }
  save(); renderApp();
  if (task.done||(task.doneOnDates||[]).includes(dateStr)) toast('Tamamlandi!');
}

function parseId(id, origId) {
  var realOrig=origId||null, instDate=null;
  if (!realOrig&&id.length>10) {
    var dp=id.slice(-10), oi=id.slice(0,-11);
    if (/^\d{4}-\d{2}-\d{2}$/.test(dp)&&tasks.find(function(t){return t.id===oi;})) {
      realOrig=oi; instDate=dp;
    }
  } else if (realOrig&&id!==realOrig) {
    var dp=id.slice(-10);
    if (/^\d{4}-\d{2}-\d{2}$/.test(dp)) instDate=dp;
  }
  return {taskId:realOrig||id, instDate:instDate};
}

function startDelete(id, origId) {
  var p = parseId(id, origId);
  var task = tasks.find(function(t){return t.id===p.taskId;});
  var isRep = task&&task.repeat&&task.repeat!=='none';
  if (isRep) { pendingDel=p; openOverlay('del-overlay'); }
  else {
    tasks = tasks.filter(function(t){return t.id!==p.taskId;});
    save(); renderApp(); toast('Silindi');
  }
}

function doDelete(scope) {
  closeDelModal();
  if (!pendingDel) return;
  var taskId=pendingDel.taskId, instDate=pendingDel.instDate;
  pendingDel=null;
  var idx = tasks.findIndex(function(t){return t.id===taskId;});
  if (idx<0) return;
  var refDate = instDate||tasks[idx].date;
  if (scope==='all') {
    tasks.splice(idx,1);
  } else if (scope==='forward') {
    var prev=fromDS(refDate); prev.setDate(prev.getDate()-1);
    var ovr=Object.fromEntries(Object.entries(tasks[idx].overrides||{}).filter(function(e){return e[0]<refDate;}));
    var exc=(tasks[idx].exceptions||[]).filter(function(e){return e<refDate;});
    tasks[idx]=Object.assign({},tasks[idx],{repeatEnd:toDS(prev),overrides:ovr,exceptions:exc});
  } else if (scope==='only') {
    if (!tasks[idx].exceptions) tasks[idx].exceptions=[];
    if (!tasks[idx].exceptions.includes(refDate)) tasks[idx].exceptions.push(refDate);
    var ovr=Object.assign({},tasks[idx].overrides||{});
    delete ovr[refDate];
    tasks[idx]=Object.assign({},tasks[idx],{overrides:ovr});
  }
  save(); renderApp(); toast('Silindi');
}

function startEdit(id) {
  var p = parseId(id,'');
  var task = tasks.find(function(t){return t.id===p.taskId;});
  if (!task) return;
  editId   = task.id;
  editDate = p.instDate;
  var ov   = p.instDate?((task.overrides||{})[p.instDate]||{}):{};
  document.getElementById('modal-title').textContent = 'Gorevi Duzenle';
  populateSelects();
  document.getElementById('f-kurum').value  = ov.kurum||task.kurum||'';
  document.getElementById('f-tur').value    = ov.tur||task.tur||'';
  document.getElementById('f-kanal').value  = ov.kanal||task.kanal||'';
  var tv = ov.tutar!==undefined?ov.tutar:task.tutar;
  document.getElementById('f-tutar').value  = tv?parseInt(tv).toLocaleString('tr-TR'):'';
  document.getElementById('f-date').value   = p.instDate||task.date;
  document.getElementById('f-time').value   = task.time||'';
  document.getElementById('f-desc').value   = ov.desc!==undefined?ov.desc:(task.desc||'');
  repeatVal = task.repeat||'none';
  document.querySelectorAll('.rep-opt').forEach(function(el){el.classList.toggle('sel',el.dataset.val===repeatVal);});
  document.getElementById('rep-end-fg').style.display = repeatVal==='none'?'none':'block';
  document.getElementById('f-rep-end').value = task.repeatEnd||'';
  openOverlay('task-overlay');
}

function saveTask() {
  var kurum=document.getElementById('f-kurum').value.trim();
  var tur  =document.getElementById('f-tur').value.trim();
  var kanal=document.getElementById('f-kanal').value.trim();
  if (!kurum){toast('Kurum secin');return;}
  if (!tur)  {toast('Odeme turu secin');return;}
  if (!kanal){toast('Odeme sekli secin');return;}
  var data = {
    title:kurum+' — '+tur, kurum:kurum, tur:tur, kanal:kanal,
    tutar:parseInt(document.getElementById('f-tutar').value.replace(/[^0-9]/g,''),10)||0,
    date:document.getElementById('f-date').value||toDS(new Date()),
    time:document.getElementById('f-time').value,
    desc:document.getElementById('f-desc').value.trim(),
    repeat:repeatVal,
    repeatEnd:document.getElementById('f-rep-end').value||''
  };
  if (editId) {
    pendingEdit=data;
    var task=tasks.find(function(t){return t.id===editId;});
    if (task&&task.repeat&&task.repeat!=='none') {
      closeOverlay('task-overlay'); openOverlay('edit-overlay'); return;
    }
    applyEdit('all');
  } else {
    tasks.push(Object.assign({id:uid(),done:false,doneOnDates:[],exceptions:[],overrides:{}},data));
    save(); closeModal(); renderApp(); toast('Gorev eklendi!');
  }
}

function doEdit(scope) { applyEdit(scope); closeOverlay('edit-overlay'); }

function applyEdit(scope) {
  var d=pendingEdit;
  if (!d||!editId) return;
  var idx=tasks.findIndex(function(t){return t.id===editId;});
  if (idx<0){closeModal();return;}
  if (scope==='all'||!editDate) {
    tasks[idx]=Object.assign({},tasks[idx],d);
  } else if (scope==='forward') {
    if (!tasks[idx].overrides) tasks[idx].overrides={};
    var allInst=getInstances(tasks[idx],editDate,'2099-12-31');
    var ov={kurum:d.kurum,tur:d.tur,kanal:d.kanal,tutar:d.tutar,desc:d.desc};
    [editDate].concat(allInst.map(function(i){return i.date;})).forEach(function(dt){tasks[idx].overrides[dt]=ov;});
  } else if (scope==='only') {
    if (!tasks[idx].overrides) tasks[idx].overrides={};
    tasks[idx].overrides[editDate]={kurum:d.kurum,tur:d.tur,kanal:d.kanal,tutar:d.tutar,desc:d.desc};
  }
  save(); closeModal(); renderApp(); toast('Guncellendi!');
  editId=null; editDate=null; pendingEdit=null;
}

// ===== TEKRAR LİSTESİ =====
function showRepList(origId) {
  var task = tasks.find(function(t){return t.id===origId;});
  if (!task) return;
  var instances = getInstances(task, '2020-01-01', '2099-12-31');
  var all = [{id:task.id, date:task.date, isRepeat:false}].concat(instances);
  all.sort(function(a,b){return a.date.localeCompare(b.date);});
  var today = toDS(new Date());
  var kc = kurumColor(task.kurum||'');

  var html = '<div style="font-family:Playfair Display,serif;font-size:17px;margin-bottom:14px">'+
    (task.kurum||'')+'  '+( task.tur||'')+'</div>';

  html += '<div style="max-height:55vh;overflow-y:auto">';
  all.forEach(function(t) {
    var ov    = t.isRepeat ? ((task.overrides||{})[t.date]||{}) : {};
    var kurum = ov.kurum || task.kurum || '—';
    var tutar = ov.tutar !== undefined ? ov.tutar : (task.tutar||0);
    var done  = t.isRepeat ? (task.doneOnDates||[]).includes(t.date) : task.done;
    var isPast = t.date < today;
    var isToday = t.date === today;
    html += '<div style="display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--border);opacity:'+(isPast&&!isToday?'0.5':'1')+'">'+
      '<div style="min-width:90px;font-size:12px;color:var(--muted)">'+
        fmtShort(t.date)+
        (t.date===task.date?'<span style="font-size:10px;color:var(--accent);margin-left:4px">Ana</span>':'')+
        (isToday?'<span style="font-size:10px;color:var(--done);margin-left:4px">Bugun</span>':'')+
      '</div>'+
      '<div style="flex:1;font-size:13px;font-weight:500;'+(done?'text-decoration:line-through;color:var(--dim)':'')+'">'+kurum+
        (Object.keys(ov).length>0?'<span style="font-size:10px;color:var(--accent);margin-left:4px">duz.</span>':'')+
      '</div>'+
      '<div style="font-family:Playfair Display,serif;font-size:13px;font-weight:700;color:var(--accent);'+(done?'text-decoration:line-through':'')+'">'+
        (tutar>0?tutar.toLocaleString('tr-TR')+' TL':'—')+
      '</div>'+
    '</div>';
  });
  html += '</div>';

  document.getElementById('replist-content').innerHTML = html;
  document.getElementById('replist-close-btn').onclick = closeRepList;
  openOverlay('replist-overlay');
}

function closeRepList() { closeOverlay('replist-overlay'); }

// ===== AYARLAR =====
function addListPrompt(type) {
  var labels={tur:'Odeme Turu',kurum:'Kurum Adi',kanal:'Odeme Sekli'};
  showInput(labels[type], type+'...', function(val){
    if(type==='tur')   {if(!turList.find(function(t){return t.val===val;})) turList.push({val:val});}
    if(type==='kurum') {if(!kurumList.includes(val)) kurumList.push(val);}
    if(type==='kanal') {if(!kanalList.find(function(k){return k.val===val;})) kanalList.push({val:val});}
    save(); renderSettingsView();
  });
}

function delItem(type,idx) {
  if(type==='tur')   turList.splice(idx,1);
  if(type==='kurum') kurumList.splice(idx,1);
  if(type==='kanal') kanalList.splice(idx,1);
  save(); renderSettingsView();
}

// ===== FİREBASE LİSTENER =====
fbDoc.onSnapshot(function(snap) {
  if(!snap.exists) return;
  if(localChange){localChange=false;return;}
  var data=snap.data();
  if(!data.tasks) return;
  tasks    =data.tasks;
  turList  =data.turList  ||turList;
  kurumList=data.kurumList||kurumList;
  kanalList=data.kanalList||kanalList;
  renderApp();
  showSyncBadge();
}, function(e){console.error(e);});

// ===== BAŞLAT =====
fbDoc.get().then(function(snap) {
  document.getElementById('loading').style.display='none';
  if(snap.exists) {
    var data=snap.data();
    tasks    =data.tasks    ||[];
    turList  =data.turList  ||[];
    kurumList=data.kurumList||[];
    kanalList=data.kanalList||[];
  }
  renderApp();
}).catch(function(e) {
  console.error(e);
  document.getElementById('loading').style.display='none';
  renderApp();
});
</script>
